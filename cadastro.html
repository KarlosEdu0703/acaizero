<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor & Arte | Criar Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #6a1b9a; --secondary-color: #ffca28; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-container { background: #fff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); max-width: 500px; width: 100%; padding: 40px 30px; }
        .brand-logo { font-weight: 800; color: var(--primary-color); letter-spacing: -1px; text-decoration: none; font-size: 1.8rem; }
        .form-control { border-radius: 10px; padding: 12px 15px; background-color: #fdfdfd; }
        .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 0.25rem rgba(106, 27, 154, 0.15); }
        .btn-register { background: var(--primary-color); color: white; border: none; border-radius: 10px; padding: 14px; font-weight: 700; transition: var(--transition); }
        .btn-register:hover { background: #511378; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center my-4">
    <div class="register-container">
        <div class="text-center mb-4">
            <a href="index.html" class="brand-logo mb-2 d-inline-block"><i class="fas fa-ice-cream me-2"></i>SABOR & ARTE</a>
            <h4 class="fw-bold text-dark mt-2">Criar nova conta</h4>
        </div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Nome Completo</label>
                <input type="text" id="nome" class="form-control" placeholder="Ex: João Silva" required>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="seuemail@provedor.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">WhatsApp</label>
                <input type="tel" id="whatsapp" class="form-control" placeholder="(31) 99999-9999" required>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">Senha</label>
                <input type="password" id="senha" class="form-control" placeholder="Crie uma senha" required>
            </div>

            <button type="submit" class="btn btn-register w-100 mb-3">CADASTRAR CONTA</button>
            
            <div class="text-center mt-4">
                <p class="small text-muted">Já tem uma conta? <a href="login.html" class="text-primary fw-bold text-decoration-none">Faça Login</a></p>
                <a href="index.html" class="text-secondary small text-decoration-none"><i class="fas fa-arrow-left me-1"></i> Voltar</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // TRAVA 1: Impede até de ver a página se já estiver logado
    if (localStorage.getItem('usuario_logado')) {
        window.location.href = 'index.html';
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // TRAVA 2: Evita duplo clique rápido no botão
        const btnSubmit = this.querySelector('button[type="submit"]');
        btnSubmit.disabled = true;

        // TRAVA 3: Verificação de segurança de última hora antes de salvar
        if (localStorage.getItem('usuario_logado')) {
            Swal.fire({ icon: 'warning', title: 'Atenção', text: 'Você já possui uma sessão ativa!' });
            setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            return;
        }
        
        const novoUsuario = {
            nome: document.getElementById('nome').value.trim(),
            email: document.getElementById('email').value.trim().toLowerCase(),
            whatsapp: document.getElementById('whatsapp').value.trim(),
            senha: document.getElementById('senha').value,
            endereco: "", 
            bairro: "", 
            cidade: ""
        };

        let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

        // TRAVA 4: UNIQUE KEY (Garante que o e-mail não seja duplicado na lista)
        if (usuarios.some(u => u.email === novoUsuario.email)) {
            Swal.fire({ 
                icon: 'error', 
                title: 'Erro', 
                text: 'Este e-mail já está cadastrado!' 
            });
            btnSubmit.disabled = false; 
            return;
        }

        // Registra e Loga o usuário
        usuarios.push(novoUsuario);
        localStorage.setItem('usuarios', JSON.stringify(usuarios));
        localStorage.setItem('usuario_logado', JSON.stringify(novoUsuario));

        document.getElementById('registerForm').reset();

        Swal.fire({
            icon: 'success',
            title: 'Cadastro Realizado!',
            text: `Bem-vindo, ${novoUsuario.nome.split(' ')[0]}!`,
            showConfirmButton: false,
            timer: 2000,
            didClose: () => { window.location.href = 'index.html'; }
        });
    });
</script>
</body>
</html>
