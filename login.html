<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor & Arte | Entrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #6a1b9a; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: #fff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); max-width: 450px; width: 100%; padding: 40px 30px; }
        .btn-login { background: var(--primary-color); color: white; border: none; border-radius: 10px; padding: 14px; font-weight: 700; }
        .btn-login:hover { background: #511378; color: white; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="text-center mb-4">
        <h4 class="fw-bold text-dark">Acesse sua conta</h4>
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">E-mail</label>
            <input type="email" id="email" class="form-control" placeholder="seuemail@provedor.com" required>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold text-muted">Senha</label>
            <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn btn-login w-100 mb-3">ENTRAR</button>
        
        <div class="text-center mt-4">
            <p class="small text-muted">Não tem uma conta? <a href="cadastro.html" class="text-primary fw-bold text-decoration-none">Cadastre-se</a></p>
            <a href="index.html" class="text-secondary small text-decoration-none">Voltar ao início</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const btnSubmit = this.querySelector('button[type="submit"]');
    btnSubmit.disabled = true;
    btnSubmit.innerText = "ENTRANDO..."; // Feedback visual de carregamento

    const dadosLogin = {
        email: document.getElementById('email').value.trim().toLowerCase(),
        senha: document.getElementById('senha').value
    };

    try {
        // Envia os dados em formato JSON para o processo_login.php
        const resposta = await fetch('processo_login.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dadosLogin)
        });

        const resultado = await resposta.json();

        if (resultado.status === 'sucesso') {
            // Guarda os dados do usuário no localStorage (inclusive a propriedade 'tipo')
            localStorage.setItem('usuario_logado', JSON.stringify(resultado.usuario));
            
            Swal.fire({
                icon: 'success', 
                title: 'Login efetuado!', 
                text: resultado.mensagem,
                showConfirmButton: false, 
                timer: 1500,
                didClose: () => { 
                    // ✨ MÁGICA DA SEPARAÇÃO AQUI ✨
                    // Verifica se o servidor marcou esse usuário como admin
                    if (resultado.tipo === 'admin') {
                        window.location.href = 'admin.html'; // Redireciona o admin para a gestão
                    } else {
                        window.location.href = 'index.html'; // Redireciona o cliente comum para a loja
                    }
                }
            });
        } else {
            // Exibe o erro retornado pelo PHP (E-mail ou senha incorretos)
            Swal.fire({ 
                icon: 'error', 
                title: 'Erro de Autenticação', 
                text: resultado.mensagem 
            });
            btnSubmit.disabled = false;
            btnSubmit.innerText = "ENTRAR";
        }
    } catch (erro) {
        Swal.fire({ 
            icon: 'error', 
            title: 'Erro de Conexão', 
            text: 'Não foi possível conectar ao servidor.' 
        });
        console.error(erro);
        btnSubmit.disabled = false;
        btnSubmit.innerText = "ENTRAR";
    }
});
</script>
</body>
</html>
